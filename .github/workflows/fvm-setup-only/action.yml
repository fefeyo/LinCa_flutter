name: FVM Setup Only
description: "Install Dart, setup FVM, cache SDKs, install Flutter via FVM"
runs:
  using: "composite"
  steps:
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable

    - name: Install FVM
      shell: bash
      run: |
        dart pub global activate fvm
        echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
        echo "FVM_CACHE_PATH=$HOME/.fvm" >> "$GITHUB_ENV"

    - name: Cache FVM & Pub (restore)
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.FVM_CACHE_PATH }}
          ~/.pub-cache
        key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}-
          fvm-${{ runner.os }}-

    - name: Install Flutter via FVM
      shell: bash
      run: |
        fvm install
        fvm flutter --version
