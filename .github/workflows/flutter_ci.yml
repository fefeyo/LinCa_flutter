name: Flutter CI

on:
  push:
    branches: [ develop ]              # マージ後のdevelopをビルドしたいなら
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup & Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/fvm-setup-codegen   # ← 生成＋artifact upload までここで

  analyze:
    name: Analyze (PR)
    if: github.event_name == 'pull_request'
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/fvm-setup-only
      - name: Download codegen
        uses: actions/download-artifact@v4
        with:
          name: codegen-${{ github.sha }}
          path: .
      - run: make analyze

  test:
    name: Test (PR)
    if: github.event_name == 'pull_request'
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/fvm-setup-only
      - name: Download codegen
        uses: actions/download-artifact@v4
        with:
          name: codegen-${{ github.sha }}
          path: .
      - run: make test

  build:
    name: Build (develop push)
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/fvm-setup-only
      - name: Download codegen
        uses: actions/download-artifact@v4
        with:
          name: codegen-${{ github.sha }}
          path: .
      - run: make init
      - run: fvm flutter build apk
