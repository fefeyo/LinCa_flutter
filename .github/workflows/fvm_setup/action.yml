name: FVM Setup
description: "Install Dart, setup FVM, cache SDKs, and install Flutter via FVM"
runs:
  using: "composite"
  steps:
    # Dartがないと `dart pub global activate fvm` が使えないので先にDartを入れる
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable

    - name: Install FVM
      shell: bash
      run: |
        dart pub global activate fvm
        echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
        # FVM のキャッシュパス（SDK配置先）を固定
        echo "FVM_CACHE_PATH=$HOME/.fvm" >> "$GITHUB_ENV"

    # FVMとpubのキャッシュを復元
    - name: Cache FVM & Pub
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.FVM_CACHE_PATH }}        # ← 固定パスではなく env を参照
          ~/.pub-cache
        key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}-
          fvm-${{ runner.os }}-

    # .fvmrcに基づいてFlutterをインストール（キャッシュがあれば高速で完了）
    - name: Install Flutter via FVM
      shell: bash
      run: |
        fvm install
        fvm flutter --version
