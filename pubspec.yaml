name: linca_otaku_support
description: "LinCa Otaku Support App"
publish_to: 'none'
version: 1.0.3+16

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1
  auto_route: ^10.1.0+1
  lottie: ^3.3.1
  fluttertoast: ^9.0.0
  flutter_svg: ^2.0.13
  qr_flutter: ^4.1.0
  sign_in_button: ^4.0.1
  smooth_page_indicator: ^2.0.1
  cached_network_image: ^3.4.1
  fl_chart: ^1.1.0

  # Platform / Device
  camera: ^0.11.2
  permission_handler: ^12.0.1
  android_intent_plus: ^6.0.0
  url_launcher: ^6.3.2
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  flutter_secure_storage: ^10.0.0
  google_sign_in: ^7.1.1
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.0
  image_picker: ^1.2.0
  flutter_image_compress: ^2.4.0
  firebase_storage: ^13.0.2
  path_provider: ^2.1.5
  collection: ^1.19.1
  uuid: ^4.5.1
  flutter_launcher_icons: ^0.14.4
  reorderables: ^0.6.0
  flutter_speed_dial: ^7.0.0
  geolocator: ^14.0.2
  latlong2: ^0.9.1
  flutter_tutorial_overlay: ^1.0.4
  firebase_analytics: ^12.1.0

  # Network / Serialization
  dio: ^5.8.0+1
  retrofit: ^4.6.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.2

  # Env
  envied: ^1.1.1
  mobile_scanner: ^7.0.1
  firebase_performance: ^0.11.1+2
  firebase_crashlytics: ^5.0.4
  share_plus: ^12.0.1
  image_gallery_saver_plus: ^4.0.1
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  # Codegen / Generators（開発時のみ）
  build_runner: ^2.5.4
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  envied_generator: ^1.1.1
  auto_route_generator: ^10.2.3
  flutter_gen_runner: ^5.3.1

  # 開発ツール / テスト補助（任意）
  change_app_package_name: ^1.5.0
  mocktail: ^1.0.4
  riverpod_test: ^0.1.9

dependency_overrides:
  vector_math: ^2.1.5

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/json/

flutter_gen:
  output: lib/core/asset_gen/
  line_length: 80
  integrations:
    flutter_svg: true
